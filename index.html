<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color"                       content="#00c8f0">
  <meta name="description"                        content="Sistema PWA de Gestión de Paradas de Máquinas para Mantenimiento Industrial">
  <meta name="apple-mobile-web-app-capable"       content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title"         content="MaintControl">
  <meta name="mobile-web-app-capable"             content="yes">
  <meta name="application-name"                   content="MaintControl">

  <!-- Open Graph -->
  <meta property="og:title"       content="MaintControl – Gestión de Paradas Industriales">
  <meta property="og:description" content="PWA instalable para registro, seguimiento y análisis de paradas de máquinas en tiempo real.">
  <meta property="og:type"        content="website">
  <meta property="og:image"       content="icons/icon-512.png">

  <title>MaintControl — Paradas Industriales</title>

  <!-- PWA Manifest -->
  <link rel="manifest"        href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <!-- Favicon SVG inline -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23080f1c'/%3E%3Ctext y='78' x='12' font-size='74' fill='%2300c8f0'%3E⚙%3C/text%3E%3C/svg%3E">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- App Stylesheet -->
  <link rel="stylesheet" href="css/app.css">

  <!-- Critical: loading screen (inline so it renders instantly) -->
  <style>
    html, body { background: #04090f; margin: 0; padding: 0; }
    #splash {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #04090f;
      z-index: 99999;
      gap: 20px;
      transition: opacity .4s ease;
    }
    #splash-gear {
      font-size: 52px;
      animation: sp-spin 2s linear infinite;
      filter: drop-shadow(0 0 14px #00c8f0);
    }
    #splash-title {
      font-family: 'Orbitron', monospace;
      font-size: 1.6rem; color: #00c8f0;
      letter-spacing: 3px;
    }
    #splash-bar-wrap {
      width: 180px; height: 3px;
      background: rgba(0,200,240,.12);
      border-radius: 99px; overflow: hidden;
    }
    #splash-bar {
      height: 100%; background: #00c8f0;
      border-radius: 99px;
      animation: sp-load 1.2s ease-in-out forwards;
    }
    #splash-sub {
      font-family: 'Inter', sans-serif;
      font-size: 12px; color: #4b6080;
    }
    @keyframes sp-spin { to { transform: rotate(360deg); } }
    @keyframes sp-load { from { width: 0 } to { width: 100% } }
  </style>
</head>
<body>

  <!-- ── Splash screen ── -->
  <div id="splash">
    <div id="splash-gear">⚙</div>
    <div id="splash-title">MaintControl</div>
    <div id="splash-bar-wrap"><div id="splash-bar"></div></div>
    <div id="splash-sub">Inicializando sistema de gestión…</div>
  </div>

  <!-- ════════════════════════════════════════════════
       External Libraries  (CDN, cached by SW)
       ════════════════════════════════════════════════ -->

  <!-- Chart.js 4 -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- SheetJS (Excel export) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <!-- ════════════════════════════════════════════════
       Application — Services (load order matters)
       ════════════════════════════════════════════════ -->
  <script src="js/services/dataService.js"></script>
  <script src="js/services/authService.js"></script>
  <script src="js/services/notificationService.js"></script>

  <!-- ════════════════════════════════════════════════
       Application — Modules
       ════════════════════════════════════════════════ -->
  <script src="js/modules/dashboard.js"></script>
  <script src="js/modules/stopages.js"></script>
  <script src="js/modules/kanban.js"></script>
  <script src="js/modules/reports.js"></script>
  <script src="js/modules/admin.js"></script>

  <!-- ════════════════════════════════════════════════
       Application — Main
       ════════════════════════════════════════════════ -->
  <script src="js/app.js"></script>

  <!-- ── Splash removal + boot ── -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Remove splash after minimum display time
      setTimeout(() => {
        const splash = document.getElementById('splash');
        if (splash) {
          splash.style.opacity = '0';
          setTimeout(() => splash.remove(), 420);
        }
      }, 900);
    });
  </script>

</body>
</html>
